<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Focus Overlay</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      .focus-border {
        box-shadow:
          inset 0 0 0 3px rgba(80, 130, 220, 0.75),
          inset 0 0 40px 14px rgba(80, 140, 255, 0.35);
        animation: focus-glow 3.5s ease-in-out infinite;
      }
      @keyframes focus-glow {
        0%,
        100% {
          box-shadow:
            inset 0 0 0 3px rgba(80, 130, 220, 0.75),
            inset 0 0 40px 14px rgba(80, 140, 255, 0.35);
        }
        50% {
          box-shadow:
            inset 0 0 0 4px rgba(80, 130, 220, 0.9),
            inset 0 0 52px 18px rgba(80, 140, 255, 0.45);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
