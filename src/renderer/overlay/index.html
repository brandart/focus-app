<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Focus Overlay</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      /* Focus border styles are injected dynamically by the overlay app */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
